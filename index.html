<!DOCTYPE html>
<!-- HTML网页第一句一般都是<!DOCTYPE html>用来告诉浏览器这是个html网页 -->
<html>
  <!--网页的所有元素都放在<html>内-->
  <head>
    <!--头部信息都放在<head>内,这些内容都是给浏览器看的,并不给用户看-->
    <meta charset="utf-8">
    <!--编码格式-->
    <title>My first page</title>
    <!--网页标题-->
  </head>
  <body>
    <!--主体内容都放在<body>内-->
    <h1>My first page</h1>
    <!--标题,根据字体大小分别可以是h1,h2,h3,h4,h5,h6-->
    <p>My first paragraph.</p>
    <!--段落(paragraph缩写)-->
    <img src="images/python-logo.png" alt="This is a python logo">
    <!--图片,src后面是网页的本地位置,alt为图片的描述-->
    <h2>常用的python库</h2>
    <ul>
      <li><a href="https://keras.io/zh/">Keras 中文文档</a></li>
      <li><a href="https://matplotlib.org/stable/tutorials/introductory/pyplot.html">matplotlib.pyplot(plt)</a></li>
      <li><a href="https://www.tensorflow.org/api_docs/python/tf">TensorFlow</a></li>
      <li><a href="https://scikit-learn.org/stable/modules/classes.html">scikit-learn(sklearn)</a></li>
      <li><a href="https://regex101.com/">正则表达式测试</a></li>
      <li><a href="https://pandas.pydata.org/docs/">Pandas</a></li>
      <li><a href="https://docs.scipy.org/doc/scipy/index.html">Scipy</a></li>
      <li><a href="https://www.crummy.com/software/BeautifulSoup/bs4/doc.zh/">BeautifulSoup(bs4)</a></li>
      <li><a href="https://numpy.org/doc/stable/index.html">Numpy</a></li>
      <li><a href="https://pgmpy.org/">pgmpy</a></li>
    </ul>
  </body>
</html>
